<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Inicio de Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>Inicio de sesión</h1>

        <form action="/ejercicio2" method="POST">
            <div class="form-group">
                <label for="nombre">Ingresa tu nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="contrasena">Ingresa tu contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required>
            </div>

            <button type="submit" class="btn-verificar">Verificar</button>
        </form>

        {% if mensaje %}
        <div class="resultado-box">
            <p>{{ mensaje }}</p>
        </div>
        {% endif %}

        <br>
        <a href="/" class="link-volver">← Volver al Menú</a>
    </div>
</body>
</html>
